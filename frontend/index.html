    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Performance: preconnect to external origins -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <!-- Google Tag Manager (only fires when VITE_GTM_ID env var is set) -->
    <script>
      if ('%VITE_GTM_ID%' !== 'VITE_GTM_ID' && '%VITE_GTM_ID%' !== '') {
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;
        f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','%VITE_GTM_ID%');
      }
    </script>

    <title>Codemistry — Web & App Development Company in India</title>
    <meta name="description" content="Codemistry is an India-based web & app development company building affordable, high-performance websites, mobile apps, e-commerce stores and AI integrations for businesses across India." />
    <meta name="keywords" content="web development India, app development India, ecommerce India, AI integration India, custom software India, website company India" />

    <!-- India geo -->
    <meta name="geo.region" content="IN-WB" />
    <meta name="geo.placename" content="Uttar Dinajpur, West Bengal, India" />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Codemistry — Web & App Development Company in India" />
    <meta property="og:description" content="Affordable, high-performance websites, mobile apps and AI integrations built for Indian businesses." />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:image" content="/og-default.png" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

    <!-- GTM noscript fallback -->
    <script>
      if ('%VITE_GTM_ID%' !== 'VITE_GTM_ID' && '%VITE_GTM_ID%' !== '') {
