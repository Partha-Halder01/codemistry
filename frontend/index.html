<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10b981" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />

    <!-- LCP hero image preload (eliminates render-blocking lag on homepage) -->
    <link rel="preload" as="image" href="/hero.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/hero-mobile.webp" fetchpriority="high" media="(max-width: 768px)" />

    <!-- Fallback for no-JS users only -->
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" /></noscript>

    <title>Codemistry — Web & App Development Company in India</title>
    <meta name="description" content="Codemistry is an India-based web & app development company building affordable, high-performance websites, mobile apps, e-commerce stores and AI integrations for businesses across India." />
    <meta name="keywords" content="web development India, app development India, ecommerce India, AI integration India, custom software India, website company India" />

    <!-- India geo -->
    <meta name="geo.region" content="IN-WB" />
    <meta name="geo.placename" content="Uttar Dinajpur, West Bengal, India" />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Codemistry — Web & App Development Company in India" />
    <meta property="og:description" content="Affordable, high-performance websites, mobile apps and AI integrations built for Indian businesses." />
    <meta property="og:url" content="https://codemistry.in/" />
    <meta property="og:site_name" content="Codemistry" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:image" content="https://codemistry.in/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Defer Google Fonts until after first paint — eliminates render-blocking
      (function () {
        var loadFont = function () {
          var l = document.createElement('link');
          l.rel = 'stylesheet';
          l.href = 'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap';
          document.head.appendChild(l);
        };
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadFont, { timeout: 1500 });
        } else {
          window.addEventListener('load', function () { setTimeout(loadFont, 100); });
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
